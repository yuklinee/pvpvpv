<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0d12" />
  <title>PHYSICA · Лаборатория физических законов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Фоновая декоративная сетка -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-noise" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- Шапка -->
  <header class="app-header">
    <div class="brand">
      <div class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="28" height="28">
          <circle cx="16" cy="16" r="2.5" fill="currentColor" />
          <ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="currentColor" stroke-width="1.2" />
          <ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="currentColor" stroke-width="1.2" transform="rotate(60 16 16)" />
          <ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="currentColor" stroke-width="1.2" transform="rotate(-60 16 16)" />
        </svg>
      </div>
      <div class="brand__text">
        <h1 class="brand__title">PHYSICA</h1>
        <p class="brand__sub">Интерактивная лаборатория · v1.14</p>
      </div>
    </div>
    <nav class="top-nav" aria-label="Дополнительно">
      <button class="icon-btn" id="toggleSidebar" aria-label="Меню законов">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6">
          <line x1="4" y1="7" x2="20" y2="7" /><line x1="4" y1="12" x2="20" y2="12" /><line x1="4" y1="17" x2="20" y2="17" />
        </svg>
      </button>
    </nav>
  </header>

  <!-- Основной макет -->
  <main class="layout">
    <!-- Левая панель — список законов -->
    <aside class="sidebar" id="sidebar" aria-label="Список физических законов">
      <div class="sidebar__head">
        <span class="sidebar__label">Законы</span>
        <span class="sidebar__count" id="lawCount">—</span>
      </div>
      <ul class="law-list" id="lawList" role="tablist"></ul>
      <div class="sidebar__foot">
        <p class="hint">TUSUR<br/>university</p>
      </div>
    </aside>

    <!-- Центральная сцена -->
    <section class="stage" aria-label="Сцена визуализации">
      <div class="stage__head">
        <div class="stage__title-wrap">
          <span class="stage__index" id="lawIndex">01</span>
          <div>
            <h2 class="stage__title" id="lawTitle">—</h2>
            <p class="stage__desc" id="lawDesc">—</p>
          </div>
        </div>
        <div class="stage__formula" id="lawFormula" aria-label="Формула"></div>
      </div>

      <div class="canvas-wrap">
        <canvas id="scene"></canvas>
        <div class="canvas-overlay">
          <div class="readout" id="readout"></div>
        </div>
      </div>

      <div class="stage__foot">
        <button class="btn btn--ghost" id="resetBtn" type="button">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 12a9 9 0 1 0 3-6.7L3 8" /><polyline points="3 3 3 8 8 8" />
          </svg>
          Сбросить параметры
        </button>
        <button class="btn btn--primary" id="playBtn" type="button">
          <span class="playBtn__icon" id="playIcon">▶</span>
          <span id="playLabel">Пауза</span>
        </button>
      </div>
    </section>

    <!-- Правая панель — параметры -->
    <aside class="controls" aria-label="Параметры закона">
      <div class="controls__head">
        <span class="controls__label">Параметры</span>
      </div>
      <div class="controls__list" id="controlsList"></div>
    </aside>
  </main>

  <!-- Скрипты: ядро + модули законов -->
  <script src="js/core.js"></script>
  <script src="js/laws/ohm.js"></script>
  <script src="js/laws/young.js"></script>
  <script src="js/laws/energy.js"></script>
  <script src="js/laws/gas.js"></script>
  <script src="js/laws/doppler.js"></script>
  <script src="js/laws/double-pendulum.js"></script>
  <script src="js/laws/gravity.js"></script>
  <script src="js/laws/coulomb.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
